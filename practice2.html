<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>

<body>
    <form action="submit.php">
        <div>
            <label for="name">Name</label>
            <input id="name" type="text" placeholder="enter your name" required>
        </div>
        <div>
            <label for="dob">Date of Birth</label>
            <input id="dob" type="date" required>
        </div>
        <div>
            <label for="age">Age</label>
            <input id="age" type="number" placeholder="enter your age">
        </div>
        <div>
            <label for="ph">Phone</label>
            <input id="ph" type="phone" placeholder="enter your number">
        </div>
        <div>
            <label for="email">email</label>
            <input id="email" type="email" placeholder="enter your email">
        </div>
        <div>
            <label for="address">Address</label>
            <input id="address" type="address" placeholder="enter your address">
        </div>
        <div>
            <label for="gender">Gender</label>
            <select id="gender" required>
                <option value="" disabled selected>select option</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">other</option>
            </select>
        </div>
        <div>
            <p>type of plan</p>
            <input id="basic" type="radio" name="subscription" value="basic">
            <label for="basic">basic</label>
            <input id="premium" type="radio" name="subscription" value="premium">
            <label for="premium">premium</label>
            <input id="vip" type="radio" name="subscription" value="vip">
            <label for="vip">vip</label>
        </div>
        <div>
            <input id="terms" type="checkbox">
            <label for="terms">i aree to the terms and conditions</label>
        </div>
        <div>
            <label for="comments">comments::</label><br>
            <textarea id="comments" placeholder="enter your comments"></textarea>
        </div>
        <div>
            <button type="submit">Submit</button>
        </div>
    </form>
</body>

</html>
