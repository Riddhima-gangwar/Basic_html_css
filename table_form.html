<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables and Forms</title>
</head>

<body>
    <h1>Tables in html</h1>
    <table>
        <thead><!--header of table come here -->
            <tr>
                <th>Name</th>
                <th>Role</th>
                <th>Salary</th>
            </tr>
        </thead>
        <tbody><!--main body of table come here-->
            <tr>
                <td>Harry</td>
                <td>Software Developer </td>
                <td>$8970000</td>
            </tr>
            <tr>
                <td>Rohan</td>
                <td>Tester</td>
                <td>$900000</td>
            </tr>
            <tr>
                <td>Shivam</td>
                <td>Planar</td>
                <td>$3402789</td>
            </tr>
            <tr>
                <td>Rita</td>
                <td>Executer</td>
                <td>$567300</td>
            </tr>
            <tr>
                <td colspan="3">THANKS </td>
            </tr>
        </tbody>
    </table>
    <hr>
    <hr>

    <!-- FORMS -->

    <h1>Forms in html</h1>
    <form action="#submit.php">
        <div>
            <label for="name">Name</label>
            <!-- for="name" describes what is associted with and put for==id name same -->
            <input id="name" type="text" placeholder="enter name" required>
        </div>
        <div>
            <label for="ph">Phone</label>
            <input id="ph" type="phone" placeholder="enter phone" required>
            <!-- required is an attribute which you have to give compulsory -->
        </div>
        <div>
            <label for="email">email</label>
            <input id="email" type="email" placeholder="enter email" required>
        </div>
        <div>
            <label for="password">Password</label>
            <input id="password" type="password" placeholder="enter password" required>
        </div>
        <div>
            <label for="dob">Date of Birth</label>
            <input id="dob" type="date" required>
        </div>
        <div>
            <label for="gender">Gender</label>
            <select id="gender" required>
                <option value="" disabled selected>Select Gender</option>
                <!-- disabled selected is used to disable that option -->
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
            </select>
        </div>
        <!-- radio buttons are used to select a particular value only one will be selected -->
        <div>
            <p>Subsciption Plan</p>
            <input id="basic" type="radio" name="Subsciption" value="basic">
            <label for="basic">Basic</label>
            <input id="premium" type="radio" name="Subsciption" value="premium">
            <label for="premium">Premium</label>
            <input id="vip" type="radio" name="subscription" value="vip">
            <label for="vip">Vip</label><!--by this for we can select the check box by clicking on vip only nt on radio button-->
        </div>
        <!-- check box for agreeing to terms -->
        <div>
            <input id="terms" type="checkbox" required>
            <label for="terms">I agree to the terms and conditions</label>
        </div>
        <!-- Textarea for comments -->
        <div>
            <label for="comments">Comments</label>
            <textarea id="comments" placeholder="enter your comments" rows="4"></textarea>
        </div>
        <!-- submit button -->
        <div>
            <button type="submit">Submit</button>
        </div>
    </form>
</body>

</html>
